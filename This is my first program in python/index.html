

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Clone</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        /* --- RESET & VARIABLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: #0f0f0f;
            color: #fff;
            overflow-x: hidden;
        }

        /* --- HEADER --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 56px;
            background-color: #0f0f0f;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            z-index: 100;
        }

        .header-left, .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .menu-btn, .icon-btn {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-btn:hover, .icon-btn:hover, .search-btn:hover {
            background-color: #272727;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }

        .logo span {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* Search Bar */
        .header-center {
            display: flex;
            align-items: center;
            flex: 0 1 600px;
            gap: 12px;
        }

        .search-container {
            display: flex;
            width: 100%;
            background-color: #121212;
            border: 1px solid #303030;
            border-radius: 40px 0 0 40px;
            padding-left: 16px;
            overflow: hidden;
        }

        .search-container:focus-within {
            border-color: #1c62b9;
        }

        .search-bar {
            width: 100%;
            background: none;
            border: none;
            color: #fff;
            font-size: 16px;
            outline: none;
            padding: 8px 0;
        }

        .search-btn {
            background-color: #222222;
            border: 1px solid #303030;
            border-left: none;
            color: #fff;
            padding: 0 20px;
            border-radius: 0 40px 40px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .mic-btn {
            background-color: #181818;
        }

        .profile-pic {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: #ff5722;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
        }

        /* --- MAIN LAYOUT --- */
        .container {
            display: flex;
            margin-top: 56px;
        }

        /* --- SIDEBAR --- */
        sidebar {
            position: fixed;
            top: 56px;
            left: 0;
            width: 240px;
            height: calc(100vh - 56px);
            background-color: #0f0f0f;
            padding: 12px;
            overflow-y: auto;
            transition: width 0.15s ease;
        }

        sidebar.collapsed {
            width: 72px;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 24px;
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            color: #fff;
            margin-bottom: 4px;
        }

        .sidebar-item:hover, .sidebar-item.active {
            background-color: #272727;
        }

        .sidebar-item span {
            font-size: 14px;
        }

        sidebar.collapsed .sidebar-item {
            flex-direction: column;
            gap: 6px;
            padding: 14px 0;
        }

        sidebar.collapsed .sidebar-item span {
            font-size: 10px;
        }

        sidebar.collapsed hr, sidebar.collapsed .sidebar-heading {
            display: none;
        }

        hr {
            border: none;
            border-top: 1px solid #303030;
            margin: 12px 0;
        }

        .sidebar-heading {
            padding: 6px 12px;
            font-size: 14px;
            font-weight: 500;
            color: #aaa;
        }

        /* --- MAIN CONTENT & VIDEO GRID --- */
        main {
            margin-left: 240px;
            padding: 24px;
            width: 100%;
            transition: margin-left 0.15s ease;
        }

        main.expanded {
            margin-left: 72px;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 40px 16px;
        }

        .video-card {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .thumbnail-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #272727;
            border-radius: 12px;
            overflow: hidden;
        }

        .thumbnail-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .duration {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background-color: rgba(0, 0, 0, 0.8);
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }

        .video-details {
            display: flex;
            gap: 12px;
        }

        .channel-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: #555;
            flex-shrink: 0;
        }

        .video-text {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .video-title {
            font-size: 16px;
            font-weight: 500;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            color: #f1f1f1;
        }

        .channel-name, .video-stats {
            font-size: 14px;
            color: #aaa;
        }

        .channel-name:hover {
            color: #fff;
        }

        /* --- RESPONSIVE BREAKPOINTS --- */
        @media (max-width: 768px) {
            sidebar {
                display: none; /* Hide sidebar completely on small mobile screens */
            }
            main {
                margin-left: 0 !important;
                padding: 12px;
            }
            .header-center {
                flex: 1;
                justify-content: flex-end;
            }
            .search-container, .search-btn {
                display: none; /* Can be toggled with JS later for mobile search */
            }
            .mic-btn {
                background: none;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <button class="menu-btn" id="menuToggle">
                <span class="material-icons-outlined">menu</span>
            </button>
            <div class="logo">
                <svg height="20" viewBox="0 0 24 24" width="28" fill="red"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                <span>YouTube</span>
            </div>
        </div>

        <div class="header-center">
            <div class="search-container">
                <input type="text" class="search-bar" placeholder="Search">
            </div>
            <button class="search-btn">
                <span class="material-icons-outlined">search</span>
            </button>
            <button class="icon-btn mic-btn">
                <span class="material-icons-outlined">mic</span>
            </button>
        </div>

        <div class="header-right">
            <button class="icon-btn">
                <span class="material-icons-outlined">video_call</span>
            </button>
            <button class="icon-btn">
                <span class="material-icons-outlined">notifications</span>
            </button>
            <div class="profile-pic">U</div>
        </div>
    </header>

    <div class="container">
        <sidebar id="sidebar">
            <a href="#" class="sidebar-item active">
                <span class="material-icons-outlined">home</span>
                <span>Home</span>
            </a>
            <a href="#" class="sidebar-item">
                <span class="material-icons-outlined">explore</span>
                <span>Shorts</span>
            </a>
            <a href="#" class="sidebar-item">
                <span class="material-icons-outlined">subscriptions</span>
                <span>Subscriptions</span>
            </a>
            <hr>
            <div class="sidebar-heading">You</div>
            <a href="#" class="sidebar-item">
                <span class="material-icons-outlined">history</span>
                <span>History</span>
            </a>
            <a href="#" class="sidebar-item">
                <span class="material-icons-outlined">playlist_play</span>
                <span>Playlists</span>
            </a>
            <a href="#" class="sidebar-item">
                <span class="material-icons-outlined">watch_later</span>
                <span>Watch Later</span>
            </a>
            <a href="#" class="sidebar-item">
                <span class="material-icons-outlined">thumb_up</span>
                <span>Liked Videos</span>
            </a>
        </sidebar>

        <main id="mainContent">
            <div class="video-grid" id="videoGrid">
                </div>
        </main>
    </div>

    <script>
        // --- SIDEBAR TOGGLE MECHANIC ---
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('mainContent');

        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
            mainContent.classList.toggle('expanded');
        });

        // --- DYNAMICALLY GENERATING VIDEO CARDS ---
        // Mock data to replicate a realistic feed
        const videosData = [
            { title: "Building a YouTube UI Clone From Scratch", channel: "CodeCraft", views: "120K views", time: "2 days ago", duration: "14:22", color: "#3498db" },
            { title: "Learn JavaScript in 15 Minutes - Ultimate Guide", channel: "DevNinja", views: "1.2M views", time: "1 month ago", duration: "15:00", color: "#e67e22" },
            { title: "Why CSS Grid is Better Than Flexbox (Or is it?)", channel: "StyleMaster", views: "45K views", time: "5 hours ago", duration: "8:45", color: "#9b59b6" },
            { title: "A Day in the Life of a Software Engineer", channel: "TechVlog", views: "310K views", time: "1 year ago", duration: "22:10", color: "#1abc9c" },
            { title: "Relaxing Lo-Fi Beats to Code/Study To", channel: "LofiChill", views: "4.5M views", time: "3 weeks ago", duration: "3:00:00", color: "#2c3e50" },
            { title: "Is Web Development Dead in 2026?", channel: "FutureTech", views: "89K views", time: "4 days ago", duration: "11:05", color: "#e74c3c" },
            { title: "How to Design Dark Mode UIs Beautifully", channel: "PixelPerfect", views: "210K views", time: "6 months ago", duration: "19:30", color: "#27ae60" },
            { title: "The Ultimate Mechanical Keyboard Setup", channel: "DeskGoals", views: "75K views", time: "12 days ago", duration: "6:15", color: "#f1c40f" }
        ];

        const videoGrid = document.getElementById('videoGrid');

        // Loop to generate cards
        videosData.forEach(video => {
            const card = document.createElement('div');
            card.className = 'video-card';
            
            card.innerHTML = `
                <div class="thumbnail-container" style="background-color: ${video.color}; opacity: 0.85;">
                    <div class="duration">${video.duration}</div>
                </div>
                <div class="video-details">
                    <div class="channel-avatar" style="background-color: ${video.color}; filter: brightness(0.7);"></div>
                    <div class="video-text">
                        <h3 class="video-title">${video.title}</h3>
                        <div class="channel-name">${video.channel}</div>
                        <div class="video-stats">${video.views} • ${video.time}</div>
                    </div>
                </div>
            `;
            videoGrid.appendChild(card);
        });
    </script>
</body>
</html>
